name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain (pinned by rust-toolchain.toml)
        run: rustup show

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm grub-common grub-pc-bin xorriso mtools qemu-system-x86

      - name: Build kernel + default userland (release ISO)
        run: make iso

      - name: Build cap_test fixtures
        run: make cap_test

      - name: Run the automated test suite
        run: make test
