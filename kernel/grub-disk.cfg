# Checkpoint U: the early config embedded directly into the installed
# boot disk's core.img via `grub-mkstandalone` (see the root Makefile's
# `disk` target) -- unlike every other `grub*.cfg` in this directory,
# this one is never copied onto a filesystem GRUB reads at boot time; it
# becomes part of core.img itself, which GRUB's embedded boot.img loads
# straight from the raw sectors between the MBR and the disk's first
# partition (the "embedding gap"), before any filesystem driver runs at
# all. Its job is just to point GRUB at the FAT32 partition (built by
# `make disk` from ordinary root-level files, exactly the layout
# fs_fat32 already understands) and hand off to the multiboot kernel.
set timeout=0
set default=0
serial --unit=0 --speed=115200
terminal_input serial
terminal_output serial
set root=(hd0,msdos1)

menuentry "ZephyrLite OS" {
    multiboot /PCERN.ELF
    module /NAMESERV.BIN
    module /CONSOLE.BIN
    module /STORAGE.BIN
    module /FS_FAT32.BIN
    module /SHELL.BIN
    boot
}
